spring:
  application:
    name: SkillSphere
  
  # H2 Database (easy dev setup - swap to PostgreSQL for production)
  datasource:
    url: jdbc:h2:mem:skillsphere
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT Configuration
jwt:
  secret: skillsphere-secret-key-for-jwt-token-generation-min-256-bits-required-here
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8080